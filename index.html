<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamilan Pro Gaming</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0b0b0d; /* Dark Gaming Theme */
            color: white;
        }
        header {
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
        }
        .hero {
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200') center/cover;
        }
        .hero h2 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px black;
        }
        .btn {
            padding: 15px 30px;
            background: #ff4b2b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
            cursor: pointer;
            border: none;
        }
        .btn:hover { 
            background: #fff; 
            color: #ff4b2b; 
        }
    </style>
</head>
<body>

<header>
    <h1>TAMILAN PRO GAMING</h1>
</header>

<div class="hero">
    <h2>Welcome to the Tamilan Pro Gameing. our website is currently development so some links will not work</h2>
    <a href="https://gamer2011pro.github.io/tamilanprogameing/" class="btn">JOIN DISCORD</a>
</div>

</body>
</html>
